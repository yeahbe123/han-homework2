            height: 100%;

        }

            left: 50%;

                    { time: 80, text: "乌鸦在树枝上诡异的很安静" },
                    { time: 90, text: "静静听我黑色的大衣" },
                    { time: 100, text: "想温暖你日渐冰冷的回忆" },
                    { time: 110, text: "走过的走过的生命" },
                    { time: 120, text: "啊四周弥漫雾气" },
                    { time: 130, text: "我在空旷的墓地" },
                    { time: 140, text: "老去后还爱你" }
                ]
            }
        ];

        // ==================== 全局变量 ====================
        let currentIndex = 0;
        let isPlaying = false;
        let playMode = 0; // 0:列表循环 1:单曲循环 2:随机播放
        let isDragging = false;

        // ==================== DOM元素 ====================
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const playImg = document.getElementById('playImg');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        const modeImg = document.getElementById('modeImg');
        const listBtn = document.getElementById('listBtn');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeImg = document.getElementById('volumeImg');
        const mvBtn = document.getElementById('mvBtn');

        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressDot = document.getElementById('progressDot');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');

        const songName = document.getElementById('songName');
        const albumName = document.getElementById('albumName');
        const singerName = document.getElementById('singerName');
        const sourceName = document.getElementById('sourceName');
        const recordImg = document.getElementById('recordImg');
        const recordDisc = document.getElementById('recordDisc');
        const needle = document.getElementById('needle');
        const bgBlur = document.getElementById('bgBlur');

        const playlistModal = document.getElementById('playlistModal');
        const playlist = document.getElementById('playlist');
        const closePlaylist = document.getElementById('closePlaylist');

        const mvModal = document.getElementById('mvModal');
        const mvVideo = document.getElementById('mvVideo');
        const closeMv = document.getElementById('closeMv');

        const lyricsScroll = document.getElementById('lyricsScroll');

        // ==================== 时间格式化函数 ====================
        function transTime(value) {
            var time = '';
            var h = parseInt(value / 3600);
            value %= 3600;
            var m = parseInt(value / 60);
            var s = parseInt(value % 60);
            if (h > 0) {
                time = formatTime(h + ':' + m + ':' + s);
            } else {
                time = formatTime(m + ':' + s);
            }
            return time;
        }

        function formatTime(value) {
            var time = '';
            var s = value.split(':');
            var i = 0;
            for (; i < s.length - 1; i++) {
                time += s[i].length == 1 ? '0' + s[i] : s[i];
                time += ':';
            }
            time += s[i].length == 1 ? '0' + s[i] : s[i];
            return time;
        }

        // ==================== 初始化 ====================
        function init() {
            loadSong(currentIndex);
            renderPlaylist();
            setupEventListeners();
        }

        // ==================== 加载歌曲 ====================
        function loadSong(index) {
            const song = songs[index];
            audio.src = song.music;
            songName.textContent = song.name;
            albumName.textContent = song.album;
            singerName.textContent = song.artist;
            sourceName.textContent = song.source;
            recordImg.src = song.cover;
            bgBlur.style.backgroundImage = `url(${song.bg})`;
            
            // 更新歌词
            renderLyrics(song.lyrics);
            
            // 更新播放列表高亮
            updatePlaylistHighlight();
            
            // 重置进度
            progressFill.style.width = '0%';
            progressDot.style.left = '0%';
            currentTimeEl.textContent = '00:00';
        }

        // ==================== 渲染歌词 ====================
        function renderLyrics(lyrics) {
            lyricsScroll.innerHTML = '';
            lyrics.forEach((line, index) => {
                const p = document.createElement('p');
                p.className = 'lyric-line';
                p.textContent = line.text;
                p.dataset.time = line.time;
                p.dataset.index = index;
                lyricsScroll.appendChild(p);
            });
        }

        // ==================== 更新歌词高亮 ====================
        function updateLyrics(currentTime) {
            const lines = lyricsScroll.querySelectorAll('.lyric-line');
            let activeIndex = -1;
            
            for (let i = lines.length - 1; i >= 0; i--) {
                if (currentTime >= parseFloat(lines[i].dataset.time)) {
                    activeIndex = i;
                    break;
                }
            }
            
            lines.forEach((line, index) => {
                if (index === activeIndex) {
                    line.classList.add('active');
                    // 滚动到中间
                    const offset = line.offsetTop - 120;
                    lyricsScroll.style.transform = `translateY(-${offset}px)`;
                } else {
                    line.classList.remove('active');
                }
            });
        }

        // ==================== 播放控制 ====================
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function play() {
            audio.play().then(() => {
                isPlaying = true;
                playImg.src = 'images/暂停.png';
                recordDisc.classList.add('playing');
                needle.classList.add('playing');
            }).catch(err => {
                console.log('播放失败:', err);
                alert('音频文件加载失败，请检查 music 文件夹中的 mp3 文件是否存在');
            });
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            playImg.src = 'images/继续播放.png';
            recordDisc.classList.remove('playing');
            needle.classList.remove('playing');
        }

        function prevSong() {
            if (playMode === 2) {
                currentIndex = Math.floor(Math.random() * songs.length);
            } else {
                currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            }
            loadSong(currentIndex);
            if (isPlaying) play();
        }

        function nextSong() {
            if (playMode === 2) {
                currentIndex = Math.floor(Math.random() * songs.length);
            } else {
                currentIndex = (currentIndex + 1) % songs.length;
            }
            loadSong(currentIndex);
            if (isPlaying) play();
        }

        // ==================== 播放模式切换 ====================
        function toggleMode() {
            playMode = (playMode + 1) % 3;
            const modes = ['mode1.png', 'mode2.png', 'mode3.png'];
            const titles = ['列表循环', '单曲循环', '随机播放'];
            modeImg.src = `images/${modes[playMode]}`;
            modeBtn.title = titles[playMode];
        }

        // ==================== 进度条控制 ====================
        function updateProgress() {
            if (!isDragging && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                progressDot.style.left = percent + '%';
                currentTimeEl.textContent = transTime(audio.currentTime);
                totalTimeEl.textContent = transTime(audio.duration);
                updateLyrics(audio.currentTime);
            }
        }

        function seek(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
                progressFill.style.width = (percent * 100) + '%';
                progressDot.style.left = (percent * 100) + '%';
            }
        }

        // ==================== 音量控制 ====================
        let currentVolume = 0.7;
        audio.volume = currentVolume;

        function toggleMute() {
            if (audio.volume > 0) {
                currentVolume = audio.volume;
                audio.volume = 0;
                volumeImg.src = 'images/静音.png';
            } else {
                audio.volume = currentVolume;
                volumeImg.src = 'images/音量.png';
            }
            updateVolumeDisplay();
        }

        function updateVolumeDisplay() {
            const fill = document.getElementById('volumeFill');
            fill.style.width = (audio.volume * 100) + '%';
        }

        function setVolume(e) {
            const rect = document.getElementById('volumeSlider').getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audio.volume = percent;
            currentVolume = percent;
            updateVolumeDisplay();
            volumeImg.src = percent > 0 ? 'images/音量.png' : 'images/静音.png';
        }

        // ==================== 播放列表 ====================
        function renderPlaylist() {
            playlist.innerHTML = '';
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>
                        <span class="song-title">${song.name}</span>
                        <span class="song-artist">${song.artist}</span>
                    </span>
                `;
                li.onclick = () => {
                    currentIndex = index;
                    loadSong(currentIndex);
                    play();
                };
                playlist.appendChild(li);
            });
        }

        function updatePlaylistHighlight() {
            const items = playlist.querySelectorAll('li');
            items.forEach((item, index) => {
                if (index === currentIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function togglePlaylist() {
            playlistModal.classList.toggle('show');
        }

        // ==================== MV播放 ====================
        function playMV() {
            const song = songs[currentIndex];
            mvVideo.src = song.video;
            mvModal.classList.add('show');
            mvVideo.play();
            pause(); // 暂停音乐，播放MV
        }

        function closeMV() {
            mvModal.classList.remove('show');
            mvVideo.pause();
            mvVideo.src = '';
        }

        // ==================== 事件监听 ====================
        function setupEventListeners() {
            // 播放控制
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevSong);
            nextBtn.addEventListener('click', nextSong);
            modeBtn.addEventListener('click', toggleMode);
            
            // 音频事件
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', () => {
                if (playMode === 1) {
                    audio.currentTime = 0;
                    play();
                } else {
                    nextSong();
                }
            });
            audio.addEventListener('loadedmetadata', () => {
                totalTimeEl.textContent = transTime(audio.duration);
            });
            
            // 进度条拖拽
            progressBar.addEventListener('click', seek);
            progressBar.addEventListener('mousedown', (e) => {
                isDragging = true;
                seek(e);
            });
            document.addEventListener('mousemove', (e) => {
                if (isDragging) seek(e);
            });
            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            // 音量控制
            volumeBtn.addEventListener('click', toggleMute);
            document.getElementById('volumeSlider').addEventListener('click', setVolume);
            
            // 播放列表
            listBtn.addEventListener('click', togglePlaylist);
            closePlaylist.addEventListener('click', togglePlaylist);
            
            // MV
            mvBtn.addEventListener('click', playMV);
            closeMv.addEventListener('click', closeMV);
            
            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                } else if (e.code === 'ArrowLeft') {
                    prevSong();
                } else if (e.code === 'ArrowRight') {
                    nextSong();
                }
            });
        }

        // ==================== 启动 ====================
        init();
        
        // ========== JavaScript 代码结束 ==========
    </script>
</body>
</html>
